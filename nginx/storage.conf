# Nginx config — storage-vyd.lambdaanalytics.co (MinIO presigned URLs)
# Aplica en el servidor: cp nginx/storage.conf /etc/nginx/sites-available/euro-vyd-storage
# Luego: ln -s /etc/nginx/sites-available/euro-vyd-storage /etc/nginx/sites-enabled/
# Luego: certbot --nginx -d storage-vyd.lambdaanalytics.co && systemctl reload nginx

server {
    server_name storage-vyd.lambdaanalytics.co;

    client_max_body_size 500M;

    access_log /var/log/nginx/euro-vyd-storage.access.log;
    error_log  /var/log/nginx/euro-vyd-storage.error.log;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    listen 80;
    listen [::]:80;
}
