# Nginx config — vyd-api.lambdaanalytics.co
# Aplica en el servidor: cp nginx/api.conf /etc/nginx/sites-available/euro-vyd-api
# Luego: ln -s /etc/nginx/sites-available/euro-vyd-api /etc/nginx/sites-enabled/
# Luego: certbot --nginx -d vyd-api.lambdaanalytics.co && systemctl reload nginx

server {
    server_name vyd-api.lambdaanalytics.co;

    client_max_body_size 50M;

    access_log /var/log/nginx/euro-vyd-api.access.log;
    error_log  /var/log/nginx/euro-vyd-api.error.log;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout    300s;
        proxy_connect_timeout  60s;
    }

    listen 80;
    listen [::]:80;
}
