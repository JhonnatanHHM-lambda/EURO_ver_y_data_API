# Nginx — acceso por IP sin SSL
# En el servidor:
#   cp /root/Proyectos/Euro_ver_y_data/Euro_ver_y_data_API/nginx/ip.conf /etc/nginx/sites-available/euro-vyd
#   ln -s /etc/nginx/sites-available/euro-vyd /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name 192.64.85.84;

    client_max_body_size 50M;

    access_log /var/log/nginx/euro-vyd.access.log;
    error_log  /var/log/nginx/euro-vyd.error.log;

    # ── API (Django/Gunicorn) ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    300s;
        proxy_connect_timeout  60s;
    }

    location /admin/ {
        proxy_pass         http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /static/ {
        proxy_pass         http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── UI (React + Nginx en Docker) ──────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
    }
}
