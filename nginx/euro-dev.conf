# Nginx — euro-dev.lambdaanalytics.co con SSL
# Aplicar en el servidor:
#   cp nginx/euro-dev.conf /etc/nginx/sites-available/euro-dev
#   ln -s /etc/nginx/sites-available/euro-dev /etc/nginx/sites-enabled/euro-dev
#   nginx -t && systemctl reload nginx

# ── Redirigir HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name euro-dev.lambdaanalytics.co;

    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name euro-dev.lambdaanalytics.co;

    # Certificados
    ssl_certificate     /etc/nginx/ssl/lambdaanalytics_fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/lambdaanalytics.key;

    # Protocolos y cifrados seguros
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50M;

    access_log /var/log/nginx/euro-dev.access.log;
    error_log  /var/log/nginx/euro-dev.error.log;

    # ── API (Django/Gunicorn) ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    300s;
        proxy_connect_timeout  60s;
    }

    location /admin/ {
        proxy_pass         http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /static/ {
        proxy_pass         http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── UI (React) ────────────────────────────────────────────────────────────
    # Redirigir raíz al path de la app para evitar que el contenedor
    # genere un redirect con su puerto interno (3000)
    location = / {
        return 301 https://$host/ver-y-data/;
    }

    location / {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
    }
}
