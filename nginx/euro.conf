# /etc/nginx/conf.d/euro.conf
# Copiar este archivo en el servidor:
#   sudo cp nginx/euro.conf /etc/nginx/conf.d/euro.conf
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 192.64.85.84;

    # Tamaño máximo de upload (para cargas Excel y documentos)
    client_max_body_size 50M;

    # ── API Django ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    # Django admin
    location /admin/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Archivos estáticos de Django (whitenoise los sirve desde /static/)
    location /static/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # ── React UI ──────────────────────────────────────────────────────────────
    location /ver-y-data/ {
        proxy_pass       http://127.0.0.1:3000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        # SPA fallback: cualquier ruta bajo /ver-y-data/ carga el index
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass http://127.0.0.1:3000/ver-y-data/index.html;
    }

    # Redirigir raíz al frontend
    location = / {
        return 301 /ver-y-data/;
    }
}
